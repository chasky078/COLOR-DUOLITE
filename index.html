<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Doulite</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#0b1220,#05070a);
  color:white;
  padding:18px;
}

.app{max-width:430px;margin:auto}

.header{text-align:center;margin-bottom:20px}
.header h1{margin:0;font-size:30px}
.header p{margin:6px 0 0;color:#94a3b8;font-size:14px}

.card,.color-card{
  background:#111827;
  border:1px solid #263241;
  border-radius:22px;
  padding:18px;
  box-shadow:0 12px 35px rgba(0,0,0,.45);
}

.label{
  color:#94a3b8;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:12px;
}

.material-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:24px;
  font-weight:bold;
}

.fixed{color:#e5e7eb}

input{
  height:58px;
  border-radius:14px;
  border:2px solid #334155;
  background:#020617;
  color:#fff;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  outline:none;
}

#p1{width:70px}
#p2{width:95px}

input:focus{
  border-color:#facc15;
  box-shadow:0 0 0 4px rgba(250,204,21,.15);
}

.preview{
  margin-top:14px;
  background:#020617;
  color:#cbd5e1;
  padding:13px;
  border-radius:14px;
  text-align:center;
  font-size:15px;
}

.actions{display:flex;gap:10px;margin-top:16px}

button{
  border:none;
  border-radius:15px;
  padding:16px;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}

.buscar{flex:1;background:#facc15;color:#111827}
.limpiar{width:94px;background:#263241;color:white}

.result{margin-top:18px}
.color-card{padding:0;overflow:hidden}

.color-box{
  @keyframes pop {
  0%{transform:scale(0.95);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

.color-card{
  animation:pop 0.2s ease;
}
  height:260px;
  margin:12px;
  border-radius:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.6), inset 0 0 20px rgba(255,255,255,.12);
  border:3px solid rgba(255,255,255,.12);
}

.result-title{
  padding:15px 18px;
  background:#0f172a;
  color:#facc15;
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:bold;
}

.row{
  padding:13px 18px;
  border-top:1px solid #263241;
  display:flex;
  justify-content:space-between;
  gap:14px;
}

.row span{color:#94a3b8}
.row strong{text-align:right;color:#f8fafc}

.error{
  margin-top:18px;
  background:#3b1111;
  color:#fecaca;
  border:1px solid #7f1d1d;
  border-radius:18px;
  padding:18px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Color Doulite</h1>
    <p>Consulta rápida por material</p>
  </div>

  <div class="card">
    <div class="label">Introduce material</div>

    <div class="material-row">
      <span class="fixed">3000</span>
      <input id="p1" type="tel" inputmode="numeric" maxlength="2" placeholder="00">
      <span class="fixed">-</span>
      <span class="fixed">00</span>
      <input id="p2" type="tel" inputmode="numeric" maxlength="3" placeholder="000">
    </div>

    <div class="preview" id="preview">Material: 300000-00000</div>

    <div class="actions">
      <button class="buscar" type="button" onclick="buscar()">BUSCAR</button>
      <button class="limpiar" type="button" onclick="limpiar()">Limpiar</button>
    </div>
  </div>

  <div id="res"></div>

</div>

<script>
const datos = [
  {material:"300000-00004",color:"ROJ",desc:"MSX09180827 120TH500 D28/14 ST"},
  {material:"300001-00008",color:"ROJ",desc:"MSX09180827 130TH480 D28/14 ST"},
  {material:"300001-00011",color:"ROJ",desc:"MSX09180834 130TH480 D28/14 ST"},
  {material:"300001-00017",color:"ROJ",desc:"MSX09180827 130TH480 E14 ST"},

  {material:"300002-00011",color:"GRI",desc:"MSX09140926 140TH520 D112/56 ST"},
  {material:"300002-00022",color:"NAR",desc:"MSX09500807 140TH620 E28 ST"},
  {material:"300002-00024",color:"BLA",desc:"MSX09500885 140TH620 E28 ST"},
  {material:"300002-00026",color:"GRI",desc:"MSX09500931 140TH620 E28 ST"},
  {material:"300002-00031",color:"NEG",desc:"MSX09501019 140TH620 E28 ST"},
  {material:"300002-00033",color:"NEG",desc:"MSX09501035 140TH620 E28 ST"},
  {material:"300002-00034",color:"ROJ",desc:"MSX09670784 140TH620 E28 ST"},
  {material:"300002-00036",color:"NEG",desc:"MSX09670960 140TH620 E28 ST"},
  {material:"300002-00038",color:"ROJ",desc:"MSX10020783 140TH620 E28 ST"},
  {material:"300002-00040",color:"NAR",desc:"MSX10020813 140TH620 E28 ST"},
  {material:"300002-00049",color:"NEG",desc:"MSX09501099 140TH620 E28 ST"},
  {material:"300002-00084",color:"NEG",desc:"MSX09670991 140TH620 E28 ST"},

  {material:"300002-00086",color:"VER",desc:"MSX08500823 140TH580 ECCS ST"},
  {material:"300002-00087",color:"NAR",desc:"MWX08500944 140TH580 ECCS ST"},
  {material:"300002-00088",color:"MAR",desc:"MWX08500790 140TH580 ECCS ST"},
  {material:"300002-00089",color:"MAR",desc:"MWX08500762 140TH580 ECCS ST"},
  {material:"300002-00090",color:"NAR",desc:"MSX08500949 140TH580 ECCS ST"},
  {material:"300002-00093",color:"MAR",desc:"MWX08200749 140TH580 ECCS ST"},

  {material:"300002-00095",color:"NEG",desc:"MSX09501091 140TH620 E28 ST"},
  {material:"300002-00096",color:"NEG",desc:"MSX09501002 140TH620 E28 ST"},
  {material:"300002-00097",color:"NEG",desc:"MSX09500991 140TH620 E28 ST"},
  {material:"300002-00099",color:"AZU",desc:"MSX09500752 140TH620 E28 ST"},

  {material:"300002-00100",color:"BLA",desc:"MSX08761091 140TH620 D28/20 FS"},
  {material:"300002-00102",color:"NEG",desc:"MSX09501112 140TH620 D28/20 ST"},
  {material:"300002-00104",color:"BLA",desc:"MSX10040890 140TH580 D28/20 FS"},
  {material:"300002-00105",color:"NEG",desc:"MSX09141112 140TH620 D28/20 FS"},
  {material:"300002-00106",color:"NEG",desc:"MWX09261055 140TH620 D28/20 ST"},
  {material:"300002-00108",color:"NEG",desc:"MSX09670931 140TH620 E28 ST"},
  {material:"300002-00109",color:"NEG",desc:"MSX09671035 140TH620 E28 ST"},

  {material:"300002-00113",color:"GRI",desc:"MSX09140950 140TH620 D28/20 FS"},
  {material:"300002-00114",color:"GRI",desc:"MSX09140931 140TH620 D28/20 FS"},
  {material:"300002-00115",color:"NEG",desc:"MSX09141035 140TH620 D28/20 FS"},
  {material:"300002-00116",color:"NEG",desc:"MSX10040950 140TH580 D28/20 FS"},
  {material:"300002-00117",color:"NEG",desc:"MSX10040936 140TH580 D28/20 FS"}
];

const p1 = document.getElementById("p1");
const p2 = document.getElementById("p2");
const res = document.getElementById("res");
const preview = document.getElementById("preview");

let timerBusqueda = null;

p1.addEventListener("input", function(){

  p1.value = p1.value.replace(/\D/g,"").slice(0,2);
  actualizarPreview();

  if(p1.value.length === 2){
    p2.focus();
  }
});, function(){
  p1.value = p1.value.replace(/\D/g,"").slice(0,2);
  actualizarPreview();

  if(p1.value.length === 2){
    p2.focus();
  }
});

p2.addEventListener("input", function(){

  p2.value = p2.value.replace(/\D/g,"").slice(0,3);
  actualizarPreview();

  clearTimeout(timerBusqueda);

  if(p2.value.length === 3){
    timerBusqueda = setTimeout(function(){
      buscar();
      p2.blur();
    }, 500);
  }
});, function(){
  p2.value = p2.value.replace(/\D/g,"").slice(0,3);
  actualizarPreview();

  clearTimeout(timerBusqueda);

  if(p2.value.length === 3){
    timerBusqueda = setTimeout(function(){
      buscar();
      p2.blur();
    }, 500);
  }
});

function construirMaterial(){
  const a = p1.value.padStart(2,"0");
  const b = p2.value.padStart(3,"0");
  return "3000" + a + "-00" + b;
}

function actualizarPreview(){
  preview.innerText = "Material: " + construirMaterial();
}

function colorBg(c){
  if(c==="ROJ") return "#e53935";
  if(c==="AMA") return "#facc15";
  if(c==="VER") return "#22c55e";
  if(c==="AZU") return "#2563eb";
  if(c==="NEG") return "#000000";
  if(c==="BLA") return "#f8fafc";
  if(c==="GRI") return "#6b7280";
  if(c==="NAR") return "#f97316";
  if(c==="MAR") return "#7c3f16";
  if(c==="SIN") return "#475569";
  return "#555";
}

function parseDesc(desc){
  try{
    const partes = desc.trim().split(/\s+/);

    const codigo = partes[0] || "";
    const medidas = codigo.substring(3);

    const tipoLetra = codigo.substring(1,2);
    const tipoCorte = tipoLetra === "S" ? "Recto" :
                      tipoLetra === "W" ? "Scroll" : "-";

    const ancho = medidas.substring(0,4) || "-";
    const largo = medidas.substring(4,8) || "-";

    let espesor = "-";
    let limite = "-";

    if(partes[1] && partes[1].includes("TH")){
      const th = partes[1].split("TH");
      espesor = "0," + th[0].slice(0,2);
      limite = th[1];
    }

    let diferencial = "-";
    let estanado = "-";

    const campo = partes[2] || "";

    if(campo.includes("ECCS")){
      estanado = "TFS";
      diferencial = "-";
    }
    else if(campo.includes("/")){
      diferencial = campo.split("/")[0].replace("D","");
      estanado = campo.split("/")[1];
    }
    else if(campo.startsWith("E")){
      estanado = campo.replace("E","");
    }
    else if(campo.startsWith("D")){
      diferencial = campo.replace("D","");
    }

    const acabadoRaw = partes[3] || "-";
    const acabado = acabadoRaw === "ST" ? "Piedra" : acabadoRaw;

    return {
      tipoCorte,
      ancho,
      largo,
      espesor,
      limite,
      diferencial,
      estanado,
      acabado
    };

  }catch(e){
    return {
      tipoCorte:"-",
      ancho:"-",
      largo:"-",
      espesor:"-",
      limite:"-",
      diferencial:"-",
      estanado:"-",
      acabado:"-"
    };
  }
}

function buscar(){
  clearTimeout(timerBusqueda);

  if(p1.value.length < 2 || p2.value.length < 3){
    return;
  }

  const material = construirMaterial();
  const d = datos.find(x => x.material === material);

  if(!d){
    res.innerHTML = `
      <div class="error">
        No encontrado ❌<br>
        Revisa el material<br>
        <small>${material}</small>
      </div>
    `;
    return;
  }

  const info = parseDesc(d.desc);

  if(navigator.vibrate){
    navigator.vibrate(50);
  }

  res.innerHTML = `
    <div class="result">
      <div class="color-card">
        <div class="color-box" style="
          background:${colorBg(d.color)};
          ${d.color==="NEG" ? "border:4px solid #94a3b8;" : ""}
          ${d.color==="BLA" ? "border:4px solid #94a3b8;" : ""}
        "></div>

        <div class="result-title">Datos del material</div>

        <div class="row"><span>Material</span><strong>${d.material}</strong></div>
        <div class="row"><span>Tipo corte</span><strong>${info.tipoCorte}</strong></div>
        <div class="row"><span>Ancho</span><strong>${info.ancho}</strong></div>
        <div class="row"><span>Largo</span><strong>${info.largo}</strong></div>
        <div class="row"><span>Espesor</span><strong>${info.espesor}</strong></div>
        <div class="row"><span>Límite elástico</span><strong>${info.limite}</strong></div>
        <div class="row"><span>Diferencial</span><strong>${info.diferencial}</strong></div>
        <div class="row"><span>Estañado</span><strong>${info.estanado}</strong></div>
        <div class="row"><span>Acabado</span><strong>${info.acabado}</strong></div>
      </div>
    </div>
  `;
}

function limpiar(){
  clearTimeout(timerBusqueda);
  p1.value = "";
  p2.value = "";
  res.innerHTML = "";
  actualizarPreview();
  p1.focus();
}

actualizarPreview();

setTimeout(() => {
  p1.focus();
}, 300);
</script>

</body>
</html>
