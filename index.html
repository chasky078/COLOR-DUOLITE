<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Doulite</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #101820, #0b0f14);
  color: #fff;
  padding: 18px;
}

.app {
  max-width: 430px;
  margin: auto;
}

.header {
  text-align: center;
  margin-bottom: 22px;
}

.header h1 {
  margin: 0;
  font-size: 28px;
}

.header p {
  margin: 6px 0 0;
  color: #9ca3af;
  font-size: 14px;
}

.card {
  background: #17212b;
  border: 1px solid #263241;
  border-radius: 18px;
  padding: 18px;
  box-shadow: 0 10px 30px rgba(0,0,0,.35);
}

.label {
  font-size: 13px;
  color: #9ca3af;
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: .8px;
}

.material-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 16px;
}

.fixed {
  color: #e5e7eb;
}

input {
  width: 68px;
  height: 54px;
  border: 2px solid #334155;
  border-radius: 12px;
  background: #0f1720;
  color: #fff;
  font-size: 24px;
  text-align: center;
  font-weight: bold;
  outline: none;
}

input:focus {
  border-color: #facc15;
}

.preview {
  background: #0f1720;
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  color: #cbd5e1;
  font-size: 15px;
  margin-bottom: 14px;
}

.actions {
  display: flex;
  gap: 10px;
}

button {
  border: none;
  border-radius: 14px;
  padding: 15px;
  font-size: 17px;
  font-weight: bold;
  cursor: pointer;
}

.buscar {
  flex: 1;
  background: #facc15;
  color: #111827;
}

.limpiar {
  width: 92px;
  background: #263241;
  color: #fff;
}

.result {
  margin-top: 18px;
}

.color-box {
  height: 155px;
  border-radius: 18px;
  border: 4px solid rgba(255,255,255,.12);
  box-shadow: inset 0 0 30px rgba(0,0,0,.2);
}

.info-card {
  margin-top: 14px;
  background: #17212b;
  border: 1px solid #263241;
  border-radius: 18px;
  overflow: hidden;
}

.info-title {
  padding: 14px 16px;
  background: #111827;
  font-size: 15px;
  font-weight: bold;
  color: #facc15;
}

.info-row {
  padding: 12px 16px;
  border-top: 1px solid #263241;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  font-size: 15px;
}

.info-row span:first-child {
  color: #9ca3af;
}

.error {
  margin-top: 18px;
  padding: 16px;
  border-radius: 14px;
  background: #3b1111;
  color: #fecaca;
  text-align: center;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="app">

  <div class="header">
    <h1>Color Doulite</h1>
    <p>Buscador rápido por material</p>
  </div>

  <div class="card">
    <div class="label">Material</div>

    <div class="material-row">
      <span class="fixed">3000</span>
      <input id="p1" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="2" placeholder="00" oninput="actualizarPreview()">
      <span class="fixed">-</span>
      <span class="fixed">00</span>
      <input id="p2" type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="3" placeholder="000" oninput="actualizarPreview()">
    </div>

    <div class="preview" id="preview">
      Material: 300000-00000
    </div>

    <div class="actions">
      <button class="buscar" onclick="buscar()">BUSCAR</button>
      <button class="limpiar" onclick="limpiar()">Limpiar</button>
    </div>
  </div>

  <div id="res"></div>

</div>

<script>
const datos = [
  {
    material:"300000-00004",
    color:"ROJ",
    desc:"MSX09180827 120TH500 D28/14 ST"
  },
  {
    material:"300002-00117",
    color:"AMA",
    desc:"MSX09140943 120TH500 D28/14 ST"
  }
];

function construirMaterial() {
  let p1 = document.getElementById("p1").value.replace(/\D/g,"").padStart(2,"0");
  let p2 = document.getElementById("p2").value.replace(/\D/g,"").padStart(3,"0");
  return "3000" + p1 + "-00" + p2;
}

function actualizarPreview() {
  document.getElementById("preview").innerText = "Material: " + construirMaterial();
}

function colorBg(c) {
  if(c=="ROJ") return "#e53935";
  if(c=="AMA") return "#facc15";
  if(c=="VER") return "#22c55e";
  if(c=="AZU") return "#2563eb";
  if(c=="NEG") return "#020617";
  if(c=="BLA") return "#f8fafc";
  if(c=="GRI") return "#6b7280";
  if(c=="NAR") return "#f97316";
  return "#555";
}

function nombreColor(c) {
  if(c=="ROJ") return "Rojo";
  if(c=="AMA") return "Amarillo";
  if(c=="VER") return "Verde";
  if(c=="AZU") return "Azul";
  if(c=="NEG") return "Negro";
  if(c=="BLA") return "Blanco";
  if(c=="GRI") return "Gris";
  if(c=="NAR") return "Naranja";
  return c;
}

function buscar() {
  const material = construirMaterial();
  const d = datos.find(x => x.material === material);
  const res = document.getElementById("res");

  if(!d) {
    res.innerHTML = `
      <div class="error">
        No encontrado<br>
        <small>${material}</small>
      </div>
    `;
    return;
  }

  res.innerHTML = `
    <div class="result">
      <div class="color-box" style="background:${colorBg(d.color)}"></div>

      <div class="info-card">
        <div class="info-title">Resultado encontrado</div>

        <div class="info-row">
          <span>Material</span>
          <strong>${d.material}</strong>
        </div>

        <div class="info-row">
          <span>Color</span>
          <strong>${nombreColor(d.color)} (${d.color})</strong>
        </div>

        <div class="info-row">
          <span>Descripción</span>
          <strong>${d.desc}</strong>
        </div>
      </div>
    </div>
  `;
}

function limpiar() {
  document.getElementById("p1").value = "";
  document.getElementById("p2").value = "";
  document.getElementById("res").innerHTML = "";
  actualizarPreview();
  document.getElementById("p1").focus();
}

actualizarPreview();
</script>

</body>
</html>
