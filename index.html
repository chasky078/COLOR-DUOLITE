<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Doulite</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#0b1220,#05070a);
  color:white;
  padding:18px;
}

.app{max-width:430px;margin:auto}

.header{text-align:center;margin-bottom:20px}
.header h1{margin:0;font-size:30px}
.header p{margin:6px 0 0;color:#94a3b8;font-size:14px}

.card,.color-card{
  background:#111827;
  border:1px solid #263241;
  border-radius:22px;
  padding:18px;
  box-shadow:0 12px 35px rgba(0,0,0,.45);
}

.label{
  color:#94a3b8;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:12px;
}

.material-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:24px;
  font-weight:bold;
}

.fixed{color:#e5e7eb}

input{
  height:58px;
  border-radius:14px;
  border:2px solid #334155;
  background:#020617;
  color:#fff;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  outline:none;
}

#p1{width:70px}
#p2{width:95px}

input:focus{
  border-color:#facc15;
  box-shadow:0 0 0 4px rgba(250,204,21,.15);
}

.preview{
  margin-top:14px;
  background:#020617;
  color:#cbd5e1;
  padding:13px;
  border-radius:14px;
  text-align:center;
  font-size:15px;
}

.actions{display:flex;gap:10px;margin-top:16px}

button{
  border:none;
  border-radius:15px;
  padding:16px;
  font-size:17px;
  font-weight:bold;
  cursor:pointer;
}

.buscar{flex:1;background:#facc15;color:#111827}
.limpiar{width:94px;background:#263241;color:white}

.result{margin-top:18px}
.color-card{padding:0;overflow:hidden}

@keyframes pop {
  0%{transform:scale(0.95);opacity:0;}
  100%{transform:scale(1);opacity:1;}
}

.color-card{
  animation:pop 0.2s ease;
}

.color-box{
  height:260px;
  margin:14px;
  border-radius:18px;
  border:8px solid #334155;
  outline:3px solid rgba(255,255,255,0.35);
  outline-offset:-14px;
  box-shadow:
    0 16px 36px rgba(0,0,0,0.75),
    inset 0 0 30px rgba(255,255,255,0.14),
    inset 0 0 0 4px rgba(0,0,0,0.28);
}
.no-lleva{
  background:#1f2937 !important;
  color:#ffffff;

  display:flex;
  flex-direction:column; /* 👈 clave para dos líneas */

  align-items:center;
  justify-content:center;

  font-weight:900;
  text-align:center;
  text-transform:uppercase;

  height:100%;
}

.no-lleva div:first-child{
  font-size:42px;
  letter-spacing:2px;
}

.no-lleva div:last-child{
  font-size:22px;
  opacity:0.8;
  margin-top:6px;
}
  background:#1f2937 !important;
  color:#ffffff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:42px;
  font-weight:900;
  letter-spacing:2px;
  text-align:center;
  text-transform:uppercase;
}
.result-title{
  padding:15px 18px;
  background:#0f172a;
  color:#facc15;
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:bold;
}

.row{
  padding:13px 18px;
  border-top:1px solid #263241;
  display:flex;
  justify-content:space-between;
  gap:14px;
}

.row span{color:#94a3b8}
.row strong{text-align:right;color:#f8fafc}

.error{
  margin-top:18px;
  background:#3b1111;
  color:#fecaca;
  border:1px solid #7f1d1d;
  border-radius:18px;
  padding:18px;
  text-align:center;
  font-weight:bold;
}
  .aviso-update{
  display:none;

  margin:20px 0;
  padding:24px;

  border-radius:22px;

  background:#0f172a;
  border:1px solid #334155;

  box-shadow:
    0 12px 30px rgba(0,0,0,0.45),
    inset 0 0 20px rgba(255,255,255,0.05);

  color:#f8fafc;

  font-size:18px; /* 👈 texto general más grande */

  min-height:180px; /* 👈 altura tipo bloque grande */
  }
  display:none;
  margin:16px 0;
  padding:16px;
  border-radius:18px;
  background:#0f172a;
  border:1px solid #334155;
  color:#f8fafc;
  box-shadow:0 10px 25px rgba(0,0,0,0.35);
  font-size:15px;
}

.aviso-update strong{
  display:block;
  color:#facc15;

  font-size:22px; /* 👈 más grande */
  margin-bottom:14px;
  }

.aviso-update ul{
  margin:12px 0 0;
  padding-left:22px;

  font-size:18px;
  line-height:1.6;
}
</style>
</head>

const p1 = document.getElementById("p1");
const p2 = document.getElementById("p2");
const res = document.getElementById("res");
const preview = document.getElementById("preview");

let timerBusqueda = null;
  const versionApp = "1.1";

const cambiosApp = [
  "🎨 Mejoras TEXTO actualización",
  "➕ Nuevos materiales añadidos",
  "⚙️ Mejoras de funcionamiento"
];

function mostrarAvisoUpdate(){
  const ultimaVersionVista = localStorage.getItem("versionAppVista");

  if(ultimaVersionVista !== versionApp){
    const aviso = document.getElementById("avisoUpdate");

    aviso.innerHTML = `
      <strong>🆕 Actualización aplicada</strong>
      <ul>
        ${cambiosApp.map(cambio => `<li>${cambio}</li>`).join("")}
      </ul>
    `;

    aviso.style.display = "block";
    localStorage.setItem("versionAppVista", versionApp);
  }
}

p1.addEventListener("input", function(){
  p1.value = p1.value.replace(/\D/g,"").slice(0,2);
  actualizarPreview();

  if(p1.value.length === 2){
    p2.focus();
  }
});

p2.addEventListener("input", function(){
  p2.value = p2.value.replace(/\D/g,"").slice(0,3);
  actualizarPreview();

  clearTimeout(timerBusqueda);

  if(p2.value.length === 3){
    timerBusqueda = setTimeout(function(){
      buscar();
      p2.blur();
    }, 500);
  }
});

function construirMaterial(){
  const a = p1.value.padStart(2,"0");
  const b = p2.value.padStart(3,"0");
  return "3000" + a + "-00" + b;
}

function actualizarPreview(){
  preview.innerText = "Material: " + construirMaterial();
}

function colorBg(c){
  if(c==="ROJ") return "#e53935";
  if(c==="AMA") return "#facc15";
  if(c==="VER") return "#22c55e";
  if(c==="AZU") return "#2563eb";
  if(c==="NEG") return "#000000";
  if(c==="BLA") return "#f8fafc";
  if(c==="GRI") return "#6b7280";
  if(c==="NAR") return "#f97316";
  if(c==="MAR") return "#7c3f16";
  if(c==="SIN") return "#475569";
  return "#555";
}

function parseDesc(desc){
  try{
    const partes = desc.trim().split(/\s+/);

    const codigo = partes[0] || "";
    const medidas = codigo.substring(3);

    const tipoLetra = codigo.substring(1,2);
    const tipoCorte = tipoLetra === "S" ? "Recto" :
                      tipoLetra === "W" ? "Scroll" : "-";

    const ancho = medidas.substring(0,4) || "-";
    const largo = medidas.substring(4,8) || "-";

    let espesor = "-";
    let limite = "-";

    if(partes[1] && partes[1].includes("TH")){
      const th = partes[1].split("TH");
      espesor = "0," + th[0].slice(0,2);
      limite = th[1];
    }

    let diferencial = "-";
    let estanado = "-";

    const campo = partes[2] || "";

    if(campo.includes("ECCS")){
      estanado = "TFS";
      diferencial = "-";
    }
    else if(campo.includes("/")){
      diferencial = campo.split("/")[0].replace("D","");
      estanado = campo.split("/")[1];
    }
    else if(campo.startsWith("E")){
      estanado = campo.replace("E","");
    }
    else if(campo.startsWith("D")){
      diferencial = campo.replace("D","");
    }

    const acabadoRaw = partes[3] || "-";
    const acabado = acabadoRaw === "ST" ? "Piedra" : acabadoRaw;

    return {
      tipoCorte,
      ancho,
      largo,
      espesor,
      limite,
      diferencial,
      estanado,
      acabado
    };

  }catch(e){
    return {
      tipoCorte:"-",
      ancho:"-",
      largo:"-",
      espesor:"-",
      limite:"-",
      diferencial:"-",
      estanado:"-",
      acabado:"-"
    };
  }
}

function buscar(){
  clearTimeout(timerBusqueda);

  if(p1.value.length < 2 || p2.value.length < 3){
    return;
  }

  const material = construirMaterial();
  const d = datos.find(x => x.material === material);

  if(!d){
    res.innerHTML = `
      <div class="error">
        No encontrado ❌<br>
        Revisa el material<br>
        <small>${material}</small>
      </div>
    `;
    return;
  }

  const info = parseDesc(d.desc);

  if(navigator.vibrate){
    navigator.vibrate(50);
  }

  res.innerHTML = `
    <div class="result">
      <div class="color-card">
        ${d.color==="SIN" 
  ? `<div class="color-box no-lleva">
  <div>NO LLEVA</div>
  <div>DUOLITE</div>
</div>
  <div>DUOLITE</div>
</div>` 
  : `<div class="color-box" style="
      background:${colorBg(d.color)};
      ${d.color==="NEG" ? "border:4px solid #94a3b8;" : ""}
      ${d.color==="BLA" ? "border:4px solid #94a3b8;" : ""}
    "></div>`
        }

        <div class="result-title">Datos del material</div>

        <div class="row"><span>Material</span><strong>${d.material}</strong></div>
        <div class="row"><span>Tipo corte</span><strong>${info.tipoCorte}</strong></div>
        <div class="row"><span>Ancho</span><strong>${info.ancho}</strong></div>
        <div class="row"><span>Largo</span><strong>${info.largo}</strong></div>
        <div class="row"><span>Espesor</span><strong>${info.espesor}</strong></div>
        <div class="row"><span>Límite elástico</span><strong>${info.limite}</strong></div>
        <div class="row"><span>Diferencial</span><strong>${info.diferencial}</strong></div>
        <div class="row"><span>Estañado</span><strong>${info.estanado}</strong></div>
        <div class="row"><span>Acabado</span><strong>${info.acabado}</strong></div>
      </div>
    </div>
  `;
}
