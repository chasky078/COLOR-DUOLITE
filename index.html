<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Doulite</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,sans-serif;
  background:linear-gradient(180deg,#0b1220,#05070a);
  color:white;
  padding:18px;
}
.app{max-width:430px;margin:auto}
.header{text-align:center;margin-bottom:20px}
.header h1{margin:0;font-size:30px}
.header p{margin:6px 0 0;color:#94a3b8;font-size:14px}

.card,.color-card{
  background:#111827;
  border:1px solid #263241;
  border-radius:22px;
  padding:18px;
  box-shadow:0 12px 35px rgba(0,0,0,.45);
}
.label{
  color:#94a3b8;
  font-size:13px;
  letter-spacing:1px;
  text-transform:uppercase;
  margin-bottom:12px;
}
.material-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  font-size:24px;
  font-weight:bold;
}
.fixed{color:#e5e7eb}

input{
  height:58px;
  border-radius:14px;
  border:2px solid #334155;
  background:#020617;
  color:#fff;
  text-align:center;
  font-size:26px;
  font-weight:bold;
  outline:none;
}
#p1{width:70px}
#p2{width:88px}

input:focus{
  border-color:#facc15;
  box-shadow:0 0 0 4px rgba(250,204,21,.15);
}
.preview{
  margin-top:14px;
  background:#020617;
  color:#cbd5e1;
  padding:13px;
  border-radius:14px;
  text-align:center;
  font-size:15px;
}
.actions{display:flex;gap:10px;margin-top:16px}
button{
  border:none;
  border-radius:15px;
  padding:16px;
  font-size:17px;
  font-weight:bold;
}
.buscar{flex:1;background:#facc15;color:#111827}
.limpiar{width:94px;background:#263241;color:white}

.result{margin-top:18px}
.color-card{padding:0;overflow:hidden}
.color-box{
  height:180px;
  border-bottom:1px solid rgba(255,255,255,.12);
}
.result-title{
  padding:15px 18px;
  background:#0f172a;
  color:#facc15;
  font-size:14px;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:bold;
}
.row{
  padding:13px 18px;
  border-top:1px solid #263241;
  display:flex;
  justify-content:space-between;
  gap:14px;
}
.row span{color:#94a3b8}
.row strong{text-align:right}
.error{
  margin-top:18px;
  background:#3b1111;
  color:#fecaca;
  border:1px solid #7f1d1d;
  border-radius:18px;
  padding:18px;
  text-align:center;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="app">
  <div class="header">
    <h1>Color Doulite</h1>
    <p>Consulta rápida por material</p>
  </div>

  <div class="card">
    <div class="label">Introduce material</div>

    <div class="material-row">
      <span class="fixed">3000</span>
      <input id="p1" type="tel" inputmode="numeric" maxlength="2" placeholder="00">
      <span class="fixed">-</span>
      <span class="fixed">00</span>
      <input id="p2" type="tel" inputmode="numeric" maxlength="3" placeholder="000">
    </div>

    <div class="preview" id="preview">Material: 300000-00000</div>

    <div class="actions">
      <button class="buscar" onclick="buscar()">BUSCAR</button>
      <button class="limpiar" onclick="limpiar()">Limpiar</button>
    </div>
  </div>

  <div id="res"></div>
</div>

<script>
const datos = [
  {material:"300000-00004",color:"ROJ",desc:"MSX09180827 120TH500 D28/14 ST"},
  {material:"300002-00117",color:"AMA",desc:"MSX09140943 120TH500 D28/14 ST"}
];

const p1 = document.getElementById("p1");
const p2 = document.getElementById("p2");

p1.addEventListener("input", function(){
  this.value = this.value.replace(/\D/g,"").slice(0,2);
  actualizarPreview();
  if(this.value.length === 2) p2.focus();
});

p2.addEventListener("input", function(){
  this.value = this.value.replace(/\D/g,"").slice(0,3);
  actualizarPreview();
});

function construirMaterial(){
  return "3000" + p1.value.padStart(2,"0") + "-00" + p2.value.padStart(3,"0");
}

function actualizarPreview(){
  document.getElementById("preview").innerText = "Material: " + construirMaterial();
}

function colorBg(c){
  if(c=="ROJ") return "#e53935";
  if(c=="AMA") return "#facc15";
  if(c=="VER") return "#22c55e";
  if(c=="AZU") return "#2563eb";
  if(c=="NEG") return "#020617";
  if(c=="BLA") return "#f8fafc";
  if(c=="GRI") return "#6b7280";
  if(c=="NAR") return "#f97316";
  return "#555";
}

function parseDesc(desc){
  const partes = desc.split(" ");
  const codigo = partes[0];
  const medidas = codigo.substring(3);
  const ancho = medidas.substring(0,4);
  const largo = medidas.substring(4,8);

  const tipoLetra = codigo.substring(1,2);
  const tipoCorte = tipoLetra === "S" ? "Recto" : "Scroll";

  const espesorRaw = partes[1].split("TH")[0];
  const limite = partes[1].split("TH")[1];

  const diferencial = partes[2].split("/")[0].replace("D","");
  const estanado = partes[2].split("/")[1];

  const acabadoRaw = partes[3];
  const acabado = acabadoRaw === "ST" ? "Piedra" : acabadoRaw;

  return {
    tipoCorte,
    ancho,
    largo,
    espesor: "0," + espesorRaw.slice(0,2),
    limite,
    diferencial,
    estanado,
    acabado
  };
}

function buscar(){
  const material = construirMaterial();
  const d = datos.find(x => x.material === material);
  const res = document.getElementById("res");

  if(!d){
    res.innerHTML = `<div class="error">No encontrado<br><small>${material}</small></div>`;
    return;
  }

  const info = parseDesc(d.desc);

  res.innerHTML = `
    <div class="result">
      <div class="color-card">
        <div class="color-box" style="background:${colorBg(d.color)}"></div>

        <div class="result-title">Datos del material</div>

        <div class="row"><span>Material</span><strong>${d.material}</strong></div>
        <div class="row"><span>Tipo corte</span><strong>${info.tipoCorte}</strong></div>
        <div class="row"><span>Ancho</span><strong>${info.ancho}</strong></div>
        <div class="row"><span>Largo</span><strong>${info.largo}</strong></div>
        <div class="row"><span>Espesor</span><strong>${info.espesor}</strong></div>
        <div class="row"><span>Límite elástico</span><strong>${info.limite}</strong></div>
        <div class="row"><span>Diferencial</span><strong>${info.diferencial}</strong></div>
        <div class="row"><span>Estañado</span><strong>${info.estanado}</strong></div>
        <div class="row"><span>Acabado</span><strong>${info.acabado}</strong></div>
      </div>
    </div>
  `;
}

function limpiar(){
  p1.value = "";
  p2.value = "";
  document.getElementById("res").innerHTML = "";
  actualizarPreview();
  p1.focus();
}

actualizarPreview();
</script>

</body>
</html>
